<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 730" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <style>
    text { fill: #222; }
    .sub { fill: #666; }
    .phase { font-size: 12.5px; }
    .ph1 { animation: ph1 14s linear infinite; }
    .ph2 { animation: ph2 14s linear infinite; }
    .ph3 { animation: ph3 14s linear infinite; }
    .ph4 { animation: ph4 14s linear infinite; }
    .ph5 { animation: ph5 14s linear infinite; }
    .ph6 { animation: ph6 14s linear infinite; }
    @keyframes ph1 { 0%, 5% { fill: #6d28d9; opacity: 1; } 6.5%, 100% { fill: #777; opacity: 0.8; } }
    @keyframes ph2 { 0%, 5.5% { fill: #777; opacity: 0.8; } 6.5%, 10.5% { fill: #6d28d9; opacity: 1; } 12%, 100% { fill: #777; opacity: 0.8; } }
    @keyframes ph3 { 0%, 11.5% { fill: #777; opacity: 0.8; } 12.5%, 16.5% { fill: #6d28d9; opacity: 1; } 18%, 100% { fill: #777; opacity: 0.8; } }
    @keyframes ph4 { 0%, 17% { fill: #777; opacity: 0.8; } 18.5%, 73.5% { fill: #6d28d9; opacity: 1; } 75%, 100% { fill: #777; opacity: 0.8; } }
    @keyframes ph5 { 0%, 74.5% { fill: #777; opacity: 0.8; } 75.5%, 79.5% { fill: #6d28d9; opacity: 1; } 81%, 100% { fill: #777; opacity: 0.8; } }
    @keyframes ph6 { 0%, 81% { fill: #777; opacity: 0.8; } 82.5%, 97% { fill: #6d28d9; opacity: 1; } 99%, 100% { fill: #777; opacity: 0.8; } }

    /* pipe glows for the 4 ALU ops */
    .glowAdd  { animation: glowAdd 14s linear infinite; opacity: 0; }
    .glowShuf { animation: glowShuf 14s linear infinite; opacity: 0; }
    .glowWhit { animation: glowWhit 14s linear infinite; opacity: 0; }
    .glowXor  { animation: glowXor 14s linear infinite; opacity: 0; }
    @keyframes glowAdd  { 0%, 0.5% { opacity: 0; } 1%, 5% { opacity: 0.4; } 5.5%, 100% { opacity: 0; } }
    @keyframes glowShuf { 0%, 6% { opacity: 0; } 6.5%, 10.5% { opacity: 0.4; } 11%, 100% { opacity: 0; } }
    @keyframes glowWhit { 0%, 12% { opacity: 0; } 12.5%, 16.5% { opacity: 0.4; } 17%, 100% { opacity: 0; } }
    @keyframes glowXor  { 0%, 75% { opacity: 0; } 75.5%, 79.5% { opacity: 0.55; } 80%, 100% { opacity: 0; } }

    /* labeled ALU-op packets: hop RF -> pipe, dwell, hop back */
    .pkAdd  { animation: pkAdd 14s linear infinite; opacity: 0; }
    .pkShuf { animation: pkShuf 14s linear infinite; opacity: 0; }
    .pkWhit { animation: pkWhit 14s linear infinite; opacity: 0; }
    .pkXor  { animation: pkXor 14s linear infinite; opacity: 0; }
    @keyframes pkAdd {
      0% { transform: translateY(0); opacity: 0; }
      0.5% { opacity: 1; }
      1.5% { transform: translateY(0); }
      1.6% { transform: translateY(90px); }
      4.4% { transform: translateY(90px); }
      4.5% { transform: translateY(0); }
      5% { opacity: 1; }
      5.5%, 100% { transform: translateY(0); opacity: 0; }
    }
    @keyframes pkShuf {
      0%, 6% { transform: translateY(0); opacity: 0; }
      6.5% { opacity: 1; }
      7% { transform: translateY(0); }
      7.1% { transform: translateY(90px); }
      9.9% { transform: translateY(90px); }
      10% { transform: translateY(0); }
      10.5% { opacity: 1; }
      11%, 100% { transform: translateY(0); opacity: 0; }
    }
    @keyframes pkWhit {
      0%, 12% { transform: translateY(0); opacity: 0; }
      12.5% { opacity: 1; }
      13% { transform: translateY(0); }
      13.1% { transform: translateY(90px); }
      15.9% { transform: translateY(90px); }
      16% { transform: translateY(0); }
      16.5% { opacity: 1; }
      17%, 100% { transform: translateY(0); opacity: 0; }
    }
    @keyframes pkXor {
      0%, 75% { transform: translateY(0); opacity: 0; }
      75.4% { opacity: 1; }
      75.9% { transform: translateY(0); }
      76% { transform: translateY(90px); }
      78.9% { transform: translateY(90px); }
      79% { transform: translateY(0); }
      79.5% { opacity: 1; }
      80%, 100% { transform: translateY(0); opacity: 0; }
    }

    .loadPkt { animation: loadPkt 14s linear infinite; opacity: 0; }
    @keyframes loadPkt {
      0% { transform: translateY(0); opacity: 0; }
      1% { opacity: 1; }
      15% { transform: translateY(-292px); opacity: 1; }
      17%, 100% { transform: translateY(-292px); opacity: 0; }
    }
    .storePkt { animation: storePkt 14s linear infinite; opacity: 0; }
    @keyframes storePkt {
      0%, 81% { transform: translateY(0); opacity: 0; }
      83% { opacity: 1; }
      96% { transform: translateY(100px); opacity: 1; }
      100% { transform: translateY(100px); opacity: 0; }
    }
    .stGlow { animation: stg 14s linear infinite; opacity: 0; }
    @keyframes stg { 0%, 81% { opacity: 0; } 83%, 97% { opacity: 0.5; } 100% { opacity: 0; } }

    /* one AES round = 0.8s: touch RF, then 4 discrete pipeline stages (latency 4) */
    .rp { animation: stepRound 0.8s linear infinite, rpwin 14s linear infinite; opacity: 0; }
    .rp2 { animation-delay: -0.4s, 0s; }
    @keyframes stepRound {
      0%, 4%   { transform: translateY(0); }
      5%, 27%  { transform: translateY(66px); }
      28%, 51% { transform: translateY(93px); }
      52%, 75% { transform: translateY(121px); }
      76%, 99% { transform: translateY(148px); }
      100%     { transform: translateY(0); }
    }
    @keyframes rpwin { 0%, 17% { opacity: 0; } 18%, 74% { opacity: 1; } 76%, 100% { opacity: 0; } }

    .band { animation: stepBand 0.8s linear infinite, bandwin 14s linear infinite; opacity: 0; }
    .band2 { animation-delay: -0.4s, 0s; }
    @keyframes stepBand {
      0%, 27%  { transform: translateY(0); }
      28%, 51% { transform: translateY(27.5px); }
      52%, 75% { transform: translateY(55px); }
      76%, 99% { transform: translateY(82.5px); }
      100%     { transform: translateY(0); }
    }
    @keyframes bandwin { 0%, 17% { opacity: 0; } 18%, 74% { opacity: 0.3; } 76%, 100% { opacity: 0; } }

    .prog { transform-box: fill-box; transform-origin: left center; animation: prog 14s linear infinite; }
    @keyframes prog {
      0%, 17% { transform: scaleX(0); animation-timing-function: steps(10, jump-none); }
      74%, 100% { transform: scaleX(1); }
    }

    .mono { font-family: "SF Mono", Menlo, Consolas, monospace; }
    /* counter register value: increments when vpaddd completes */
    .ctrA { animation: ctrA 14s linear infinite; }
    @keyframes ctrA { 0%, 4.5% { opacity: 1; } 5%, 100% { opacity: 0; } }
    .ctrB { animation: ctrB 14s linear infinite; opacity: 0; }
    @keyframes ctrB { 0%, 4.5% { opacity: 0; } 5%, 100% { opacity: 1; } }
    /* ciphertext buffer: fills when the store lands */
    .ctBefore { animation: ctBefore 14s linear infinite; }
    @keyframes ctBefore { 0%, 91% { opacity: 1; } 92%, 100% { opacity: 0; } }
    .ctAfter { animation: ctAfter 14s linear infinite; opacity: 0; }
    @keyframes ctAfter { 0%, 91% { opacity: 0; } 92%, 100% { opacity: 1; } }

    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <rect x="0" y="0" width="960" height="730" fill="#ffffff"/>

  <text x="480" y="28" text-anchor="middle" font-size="18" font-weight="600">One 64-byte chunk through the Zen 5 FP/SIMD unit (AES-128-CTR, variant 6)</text>

  <!-- phase captions: all visible, active one highlights purple -->
  <text class="phase ph1" x="100" y="56" fill="#777">1. vpaddd — increment the counters (the plaintext load runs in parallel throughout, off the critical path)</text>
  <text class="phase ph2" x="100" y="74" fill="#777">2. vpshufb — byte-swap the counters into big-endian block order</text>
  <text class="phase ph3" x="100" y="92" fill="#777">3. vpxorq — round-0 whitening: counter ⊕ rk0 enters the AESENC chain</text>
  <text class="phase ph4" x="100" y="110" fill="#777">4. ten serial VAESENC rounds, each stepping through 4 pipeline stages (latency 4); hollow packet = other chunks</text>
  <text class="phase ph5" x="100" y="128" fill="#777">5. vpxorq — keystream ⊕ plaintext, on whichever ALU pipe is free</text>
  <text class="phase ph6" x="100" y="146" fill="#777">6. ciphertext exits via the store-data pipes into the store queue, then commits to L1D</text>

  <g transform="translate(0,102)">

    <!-- Register file -->
    <rect x="100" y="84" width="680" height="64" fill="#f5f5f5" stroke="#999"/>
    <text x="440" y="110" text-anchor="middle" font-size="15" font-weight="600">FP/SIMD Register File (384 × 512-bit)</text>
    <rect x="130" y="116" width="252" height="22" rx="3" fill="#ffffff" stroke="#b9a3e3"/>
    <text class="mono ctrA" x="138" y="131" font-size="11" fill="#6d28d9">zmm ctr: [ 8 | 9 | 10 | 11 ]</text>
    <text class="mono ctrB" x="138" y="131" font-size="11" fill="#6d28d9" opacity="0">zmm ctr: [ 12 | 13 | 14 | 15 ]</text>
    <text x="400" y="131" font-size="11" class="sub">← 4 blocks per zmm, +4 each iteration&#160;&#160;·&#160;&#160;11 round keys stay resident</text>

    <!-- RF -> pipe connectors -->
    <g stroke="#ccc" stroke-width="2">
      <line x1="192" y1="148" x2="192" y2="208"/>
      <line x1="299" y1="148" x2="299" y2="208"/>
      <line x1="406" y1="148" x2="406" y2="208"/>
      <line x1="513" y1="148" x2="513" y2="208"/>
      <line x1="620" y1="148" x2="620" y2="208"/>
      <line x1="727" y1="148" x2="727" y2="208"/>
    </g>

    <!-- Pipes (numeric order 0-5) -->
    <g>
      <rect x="150" y="210" width="84" height="110" fill="#f1eafb" stroke="#8b5cf6"/>
      <rect x="257" y="210" width="84" height="110" fill="#f1eafb" stroke="#8b5cf6"/>
      <rect x="364" y="210" width="84" height="110" fill="#ececec" stroke="#999"/>
      <rect x="471" y="210" width="84" height="110" fill="#ececec" stroke="#999"/>
      <rect x="578" y="210" width="84" height="110" fill="#fdf6e9" stroke="#d9a406"/>
      <rect x="685" y="210" width="84" height="110" fill="#fdf6e9" stroke="#d9a406"/>
      <!-- pipeline-stage tick marks on the AES pipes -->
      <g stroke="#c9b8ec" stroke-width="1" stroke-dasharray="3,3">
        <line x1="150" y1="237.5" x2="234" y2="237.5"/>
        <line x1="150" y1="265" x2="234" y2="265"/>
        <line x1="150" y1="292.5" x2="234" y2="292.5"/>
        <line x1="257" y1="237.5" x2="341" y2="237.5"/>
        <line x1="257" y1="265" x2="341" y2="265"/>
        <line x1="257" y1="292.5" x2="341" y2="292.5"/>
      </g>
      <!-- active-stage bands (quarter of the pipe, stepping once per "cycle") -->
      <rect class="band" x="150" y="210" width="84" height="27.5" fill="#8b5cf6" opacity="0"/>
      <rect class="band band2" x="257" y="210" width="84" height="27.5" fill="#8b5cf6" opacity="0"/>
      <!-- ALU-op glows -->
      <rect class="glowAdd" x="364" y="210" width="84" height="110" fill="#8b5cf6" opacity="0"/>
      <rect class="glowShuf" x="471" y="210" width="84" height="110" fill="#8b5cf6" opacity="0"/>
      <rect class="glowWhit" x="364" y="210" width="84" height="110" fill="#8b5cf6" opacity="0"/>
      <rect class="glowXor" x="471" y="210" width="84" height="110" fill="#8b5cf6" opacity="0"/>
      <!-- store glows -->
      <rect class="stGlow" x="578" y="210" width="84" height="110" fill="#f59e0b" opacity="0"/>
      <rect class="stGlow" x="685" y="210" width="84" height="110" fill="#f59e0b" opacity="0"/>
    </g>
    <g text-anchor="middle" font-size="13" font-weight="600">
      <text x="192" y="255">Pipe 0</text>
      <text x="299" y="255">Pipe 1</text>
      <text x="406" y="255">Pipe 2</text>
      <text x="513" y="255">Pipe 3</text>
      <text x="620" y="255">Pipe 4</text>
      <text x="727" y="255">Pipe 5</text>
    </g>
    <g text-anchor="middle" font-size="11">
      <text x="192" y="276" fill="#6d28d9" font-weight="600">AES unit</text>
      <text x="299" y="276" fill="#6d28d9" font-weight="600">AES unit</text>
      <text x="406" y="276" class="sub">SIMD ALU</text>
      <text x="513" y="276" class="sub">SIMD ALU</text>
      <text x="620" y="276" class="sub">store data</text>
      <text x="727" y="276" class="sub">store data</text>
      <text x="620" y="292" class="sub">(StD)</text>
      <text x="727" y="292" class="sub">(StD / F2I)</text>
    </g>

    <!-- ⊕ symbol above pipe 3 during the final XOR -->
    <text class="glowXor" x="513" y="192" text-anchor="middle" font-size="26" fill="#7c3aed" font-weight="700" opacity="0">⊕</text>

    <!-- AES round packets: touch RF, then 4 discrete stages down the AES pipe -->
    <g transform="translate(192,158)"><g class="rp"><circle r="7" fill="#7c3aed"/></g></g>
    <g transform="translate(299,158)"><g class="rp rp2"><circle r="7" fill="#ffffff" stroke="#7c3aed" stroke-width="2.5"/></g></g>

    <!-- labeled ALU-op packets (squares, to distinguish from the AES round balls) -->
    <g transform="translate(406,158)">
      <g class="pkAdd">
        <rect x="-6" y="-6" width="12" height="12" rx="2" fill="#7c3aed"/>
        <text x="11" y="4" font-size="10.5" fill="#6d28d9">vpaddd</text>
      </g>
    </g>
    <g transform="translate(513,158)">
      <g class="pkShuf">
        <rect x="-6" y="-6" width="12" height="12" rx="2" fill="#7c3aed"/>
        <text x="11" y="4" font-size="10.5" fill="#6d28d9">vpshufb</text>
      </g>
    </g>
    <g transform="translate(406,158)">
      <g class="pkWhit">
        <rect x="-6" y="-6" width="12" height="12" rx="2" fill="#7c3aed"/>
        <text x="11" y="4" font-size="10.5" fill="#6d28d9">vpxorq rk0</text>
      </g>
    </g>
    <g transform="translate(513,158)">
      <g class="pkXor">
        <rect x="-6" y="-6" width="12" height="12" rx="2" fill="#7c3aed"/>
        <text x="11" y="4" font-size="10.5" fill="#6d28d9">vpxorq pt</text>
      </g>
    </g>

    <!-- rounds progress bar (fills in 10 discrete steps, one per round) -->
    <rect x="150" y="346" width="191" height="8" fill="#eee" stroke="#ccc"/>
    <rect class="prog" x="150" y="346" width="191" height="8" fill="#8b5cf6"/>
    <text x="150" y="372" font-size="11.5" class="sub">10 × VAESENC ≈ 5 amortized cycles per chunk (a lone chunk would take 10 × 4-cycle latency = 40)</text>

    <!-- load buses (LSU -> RF) -->
    <g stroke="#f59e0b" stroke-width="7" opacity="0.3">
      <line x1="118" y1="436" x2="118" y2="158"/>
      <line x1="140" y1="436" x2="140" y2="158"/>
    </g>
    <g fill="#f59e0b" opacity="0.5">
      <polygon points="118,148 112,160 124,160"/>
      <polygon points="140,148 134,160 146,160"/>
    </g>
    <g font-size="11" class="sub">
      <text x="6" y="280">2× 512-bit</text>
      <text x="6" y="296">loads / cycle</text>
      <text x="6" y="312" fill="#b45309">kernel uses ~10%</text>
    </g>

    <!-- plaintext load packet -->
    <g transform="translate(129,452)">
      <g class="loadPkt">
        <circle r="8" fill="#f59e0b"/>
        <text x="14" y="4" font-size="11" fill="#b45309">plaintext (64 B)</text>
      </g>
    </g>

    <!-- store paths (StD pipes -> LSU) -->
    <g stroke="#f59e0b" stroke-width="7" opacity="0.3">
      <line x1="620" y1="322" x2="620" y2="434"/>
      <line x1="727" y1="322" x2="727" y2="434"/>
    </g>
    <g fill="#f59e0b" opacity="0.5">
      <polygon points="620,442 614,430 626,430"/>
      <polygon points="727,442 721,430 733,430"/>
    </g>
    <g font-size="11" class="sub">
      <text x="782" y="380">1× 512-bit store/cycle</text>
      <text x="782" y="396" fill="#b45309">kernel uses ~20%</text>
    </g>

    <!-- ciphertext store packet -->
    <g transform="translate(673,330)">
      <g class="storePkt">
        <circle r="8" fill="#f59e0b"/>
        <text x="14" y="4" font-size="11" fill="#b45309">ciphertext</text>
      </g>
    </g>

    <!-- Load-Store Unit -->
    <rect x="100" y="440" width="680" height="64" fill="#ececec" stroke="#999"/>
    <text x="440" y="462" text-anchor="middle" font-size="14" font-weight="600">Load-Store Unit → 48 KiB L1D (4-cycle) → 1 MiB L2</text>
    <rect x="140" y="472" width="300" height="22" rx="3" fill="#ffffff" stroke="#d9a406"/>
    <text class="mono" x="148" y="487" font-size="10.5" fill="#92610a">pt: 61 74 74 61 63 6b 20 61 74 20 64 61 …</text>
    <rect x="460" y="472" width="300" height="22" rx="3" fill="#ffffff" stroke="#d9a406"/>
    <text class="mono ctBefore" x="468" y="487" font-size="10.5" fill="#aaaaaa">ct: ·· ·· ·· ·· ·· ·· ·· ·· ·· ·· ·· ·· …</text>
    <text class="mono ctAfter" x="468" y="487" font-size="10.5" fill="#92610a" opacity="0">ct: 9f 3a c2 44 07 e1 5b 88 d0 26 4a f3 …</text>
    <text x="440" y="518" text-anchor="middle" font-size="11" class="sub">at ZMM width: 2 loads + 1 store-commit per cycle</text>

    <!-- Integer half -->
    <rect x="808" y="440" width="144" height="64" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="880" y="466" text-anchor="middle" font-size="12.5" fill="#1e40af" font-weight="600">Integer half</text>
    <text x="880" y="484" text-anchor="middle" font-size="10.5" fill="#1e40af">pointer bump + branch</text>

    <!-- bottom notes -->
    <text x="480" y="540" text-anchor="middle" font-size="12.5" class="sub">The animation follows a single chunk: memory is touched exactly twice, wrapped around ~5 cycles of register-only AES.</text>
    <text x="480" y="558" text-anchor="middle" font-size="12.5" class="sub">In steady state 8 chunks are interleaved (2 pipes × 4-cycle latency), keeping pipes 0/1 saturated every cycle.</text>
    <text x="480" y="576" text-anchor="middle" font-size="12.5" class="sub">Pipes 2/3 stay only ~40% busy: 4 ALU ops per chunk vs 10 AES ops — chunks finish (and need XORs) at just 0.2/cycle.</text>
    <text x="480" y="594" text-anchor="middle" font-size="12.5" class="sub">(NSQ and schedulers omitted; pipes drawn in numeric order — the SOG diagram groups them by scheduler: 0/2, 1/3, 4/5.)</text>
    <text x="480" y="616" text-anchor="middle" font-size="11.5" class="sub">purple = SIMD compute&#160;&#160;·&#160;&#160;orange = memory traffic&#160;&#160;·&#160;&#160;blue = integer</text>

  </g>
</svg>
