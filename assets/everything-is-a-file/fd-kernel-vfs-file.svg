<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">The four different meanings of the word "file"</title>
  <desc id="desc">The same conceptual diagram of discovery mechanisms, kernel resources, and file descriptors, with the four places the word "file" hides marked by numbered badges: (1) the virtual File system pathname (VFS path namespace), (2) the File descriptor (per-process fd table), (3) the struct file kernel object behind the descriptor, and (4) the persistent File system on disk.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #222; }
      .title { font-size: 24px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #555; }
      .section { font-size: 17px; font-weight: 700; }
      .small { font-size: 13px; }
      .tiny { font-size: 12px; }
      .muted { fill: #666; }
      .user { fill: #f7f9ff; stroke: #5265c7; stroke-width: 2; rx: 14; }
      .kernel { fill: #fff8e8; stroke: #c88719; stroke-width: 2; rx: 14; }
      .disk { fill: #eef8ee; stroke: #2e7d32; stroke-width: 2; rx: 14; }
      .box { fill: #fff; stroke: #555; stroke-width: 1.5; rx: 9; }
      .fd { fill: #eef3ff; stroke: #3f51b5; stroke-width: 1.6; rx: 7; }
      .ofd { fill: #fff; stroke: #7b4fb3; stroke-width: 1.7; rx: 10; }
      .res { fill: #fff; stroke: #555; stroke-width: 1.5; rx: 9; }
      .file { fill: #f2fff2; stroke: #2e7d32; stroke-width: 1.6; rx: 8; }
      .line { stroke: #333; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #777; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
      .boundary { stroke: #aaa; stroke-width: 2; stroke-dasharray: 9 7; }
      .hl { font-weight: 800; fill: #111; text-decoration: underline; }
      .badge { fill: #111; }
      .badgetext { fill: #fff; font-size: 14px; font-weight: 800; }
      .badgetext-sm { fill: #fff; font-size: 11px; font-weight: 800; }
      .legend { fill: #fff; stroke: #555; stroke-width: 1.5; rx: 10; }
    </style>
  </defs>

  <rect x="20" y="20" width="1240" height="780" fill="#fff" stroke="#ddd" rx="18" />
  <text x="640" y="54" text-anchor="middle" class="title">One word, four meanings: where "file" hides</text>
  <text x="640" y="78" text-anchor="middle" class="subtitle">The kernel manages resources. Namespaces and constructors are ways to get handles; fd tables are where held handles live.</text>

  <line x1="55" y1="205" x2="1225" y2="205" class="boundary" />
  <line x1="55" y1="610" x2="1225" y2="610" class="boundary" />
  <text x="70" y="96" class="section">user space</text>
  <text x="70" y="235" class="section">kernel space</text>
  <text x="70" y="640" class="section">disk / persistent storage</text>

  <!-- User side -->
  <rect x="80" y="105" width="330" height="88" class="user" />
  <text x="105" y="132" class="section">ask for access</text>
  <text x="105" y="157" class="small">open(path), socket(), pidfd_open()</text>
  <text x="105" y="177" class="small">timerfd_create(), receive fd, ...</text>

  <rect x="830" y="105" width="330" height="88" class="user" />
  <text x="855" y="132" class="section">use access you hold</text>
  <text x="855" y="157" class="small">int fd = 3</text>
  <text x="855" y="177" class="small">read(fd), poll(fd), ioctl(fd), close(fd)</text>

  <!-- Left kernel: discovery -->
  <rect x="80" y="255" width="300" height="305" class="kernel" />
  <text x="105" y="284" class="section">discovery / creation</text>
  <text x="105" y="307" class="tiny muted">ways to locate, create, or receive resources</text>

  <rect x="105" y="330" width="245" height="34" class="box" />
  <text x="123" y="352" class="small">PID namespace</text>
  <rect x="105" y="374" width="245" height="34" class="box" />
  <text x="123" y="396" class="small">network address namespace</text>
  <rect x="105" y="418" width="245" height="34" class="box" />
  <text x="123" y="440" class="small">anonymous constructors</text>
  <rect x="105" y="462" width="245" height="34" class="box" />
  <text x="123" y="484" class="small">fd inheritance / SCM_RIGHTS</text>
  <rect x="105" y="506" width="245" height="34" class="box" />
  <text x="123" y="528" class="small">V<tspan class="hl">F</tspan>S path namespace <tspan class="tiny muted">(Virtual File System)</tspan></text>

  <!-- Center kernel: resources -->
  <rect x="455" y="245" width="315" height="360" class="kernel" />
  <text x="480" y="274" class="section">resource-specific state</text>
  <text x="480" y="297" class="tiny muted">what the kernel actually manages</text>

  <rect x="485" y="325" width="120" height="42" class="res" />
  <text x="512" y="351" class="small">process</text>
  <rect x="625" y="325" width="110" height="42" class="res" />
  <text x="658" y="351" class="small">event</text>
  <rect x="485" y="385" width="120" height="42" class="res" />
  <text x="522" y="411" class="small">socket</text>
  <rect x="625" y="385" width="110" height="42" class="res" />
  <text x="663" y="411" class="small">pipe</text>
  <rect x="485" y="445" width="120" height="42" class="res" />
  <text x="524" y="471" class="small">timer</text>
  <rect x="625" y="445" width="110" height="42" class="res" />
  <text x="663" y="471" class="small">epoll</text>
  <rect x="485" y="505" width="120" height="42" class="res" />
  <text x="510" y="531" class="small">inode/file</text>
  <rect x="625" y="505" width="110" height="42" class="res" />
  <text x="659" y="531" class="small">BPF</text>

  <!-- Right kernel: descriptors -->
  <rect x="845" y="245" width="315" height="155" class="kernel" />
  <text x="870" y="274" class="section">per-process <tspan class="hl">f</tspan>d table <tspan class="tiny muted">(file descriptor)</tspan></text>
  <rect x="875" y="305" width="75" height="30" class="fd" />
  <text x="890" y="325" class="small">0 stdin</text>
  <rect x="960" y="305" width="78" height="30" class="fd" />
  <text x="974" y="325" class="small">1 stdout</text>
  <rect x="1048" y="305" width="75" height="30" class="fd" />
  <text x="1063" y="325" class="small">2 stderr</text>
  <rect x="875" y="350" width="75" height="30" class="fd" />
  <text x="907" y="370" class="small">3</text>
  <rect x="960" y="350" width="78" height="30" class="fd" />
  <text x="994" y="370" class="small">4</text>
  <text x="870" y="388" class="tiny muted">fd lookup = integer → open handle</text>

  <rect x="845" y="445" width="315" height="160" class="kernel" />
  <text x="870" y="474" class="section">struct <tspan class="hl">file</tspan> / open handle</text>
  <text x="870" y="497" class="tiny muted">fd-facing wrapper for a resource</text>
  <rect x="875" y="520" width="245" height="54" class="ofd" />
  <text x="895" y="542" class="small">offset, flags, refcount</text>
  <text x="895" y="560" class="tiny muted">+ file_operations dispatch table</text>

  <!-- Disk -->
  <rect x="455" y="625" width="390" height="105" class="disk" />
  <text x="480" y="654" class="section"><tspan class="hl">file</tspan>system on disk</text>
  <text x="480" y="676" class="tiny muted">persistent metadata and file contents</text>
  <rect x="670" y="690" width="145" height="30" class="file" />
  <text x="695" y="710" class="small">disk blocks</text>

  <!-- Arrows -->
  <path d="M 245 183 L 245 255" class="dash" />
  <text x="260" y="224" class="tiny muted">name/create/receive</text>

  <path d="M 350 347 C 405 342, 430 346, 485 346" class="line" />
  <text x="385" y="335" class="tiny muted">pid → process</text>

  <path d="M 350 391 C 405 396, 430 406, 485 406" class="line" />
  <text x="384" y="382" class="tiny muted">addr → socket</text>

  <path d="M 350 435 C 420 438, 455 466, 485 466" class="line" />
  <text x="374" y="456" class="tiny muted">create anonymous resource</text>

  <path d="M 350 523 C 405 523, 430 526, 485 526" class="line" />
  <text x="385" y="512" class="tiny muted">path → inode/file</text>

  <path d="M 875 547 C 805 505, 790 385, 875 365" class="line" />
  <text x="820" y="426" class="tiny muted">install fd</text>

  <path d="M 995 183 L 995 245" class="line" />
  <text x="1010" y="224" class="tiny muted">use fd</text>

  <path d="M 1002 400 L 1002 445" class="line" />
  <text x="1015" y="428" class="tiny muted">fd lookup</text>

  <path d="M 875 547 L 770 547" class="line" />
  <text x="745" y="535" class="tiny muted">file_operations dispatch</text>

  <path d="M 545 547 C 555 590, 610 655, 690 690" class="dash" />
  <text x="520" y="625" class="tiny muted">only storage-backed files</text>

  <!-- "file" meaning badges -->
  <circle cx="105" cy="506" r="13" class="badge" />
  <text x="105" y="511" text-anchor="middle" class="badgetext">1</text>
  <circle cx="845" cy="245" r="13" class="badge" />
  <text x="845" y="250" text-anchor="middle" class="badgetext">2</text>
  <circle cx="845" cy="445" r="13" class="badge" />
  <text x="845" y="450" text-anchor="middle" class="badgetext">3</text>
  <circle cx="455" cy="625" r="13" class="badge" />
  <text x="455" y="630" text-anchor="middle" class="badgetext">4</text>

  <!-- Legend: the four meanings -->
  <rect x="865" y="626" width="350" height="132" class="legend" />
  <text x="884" y="652" class="section">"file" names four different things</text>
  <circle cx="893" cy="676" r="9" class="badge" />
  <text x="893" y="680" text-anchor="middle" class="badgetext-sm">1</text>
  <text x="911" y="681" class="small">virtual <tspan class="hl">File</tspan> system pathname</text>
  <circle cx="893" cy="699" r="9" class="badge" />
  <text x="893" y="703" text-anchor="middle" class="badgetext-sm">2</text>
  <text x="911" y="704" class="small"><tspan class="hl">File</tspan> descriptor (fd)</text>
  <circle cx="893" cy="722" r="9" class="badge" />
  <text x="893" y="726" text-anchor="middle" class="badgetext-sm">3</text>
  <text x="911" y="727" class="small">struct <tspan class="hl">file</tspan> kernel object</text>
  <circle cx="893" cy="745" r="9" class="badge" />
  <text x="893" y="749" text-anchor="middle" class="badgetext-sm">4</text>
  <text x="911" y="750" class="small">persistent <tspan class="hl">File</tspan> system on disk</text>

  <text x="80" y="785" class="tiny muted">The fd API is unified around struct file + file_operations; the resource-specific state behind it is not necessarily file-like.</text>
</svg>
